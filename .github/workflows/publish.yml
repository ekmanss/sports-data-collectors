name: Publish

on:
  push:
    tags:
      - '@ekmanss/5eplay@*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: corepack enable
      - run: npm install --global npm@11.18.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Select and verify package
        id: package
        shell: bash
        run: |
          name='@ekmanss/5eplay'
          directory='packages/5eplay'
          version="$(node -p "require('./${directory}/package.json').version")"
          test "${GITHUB_REF_NAME}" = "${name}@${version}"
          echo "name=${name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "directory=${directory}" >> "${GITHUB_OUTPUT}"
      - name: Check registry
        id: registry
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>registry-error.log; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          elif grep -q 'E404' registry-error.log; then
            echo "published=false" >> "${GITHUB_OUTPUT}"
          else
            cat registry-error.log >&2
            exit 1
          fi
      - name: Publish package
        if: steps.registry.outputs.published != 'true'
        working-directory: ${{ steps.package.outputs.directory }}
        run: npm publish --access public
