name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm --filter @ekmanss/5eplay exec npm pack --dry-run --ignore-scripts
